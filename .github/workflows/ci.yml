name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python - <<'PY'
          import ast
          import pathlib

          files = sorted(
              str(path)
              for pattern in ('*.py', 'daily_briefing/**/*.py', 'notion_engine/**/*.py')
              for path in pathlib.Path('.').glob(pattern)
          )

          for f in files:
              ast.parse(pathlib.Path(f).read_text(), filename=f)
          print('syntax_ok')
          PY
